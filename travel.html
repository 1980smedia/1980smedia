<!DOCTYPE html>
<html>
<head>
<title>Travel Reels - 1980s Media</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
background:#050505;
color:white;
font-family:Poppins;
padding:30px;
}

h1{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
}

.card video,
.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card span{
display:block;
padding:10px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Travel Reels</h1>

<div class="grid">

<div class="card">
<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-road-5170/1080p.mp4">
</video>
<span>Mountain Drive</span>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1200&auto=format&fit=crop">
<span>Adventure</span>
</div>

<div class="card">
<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-driving-on-a-road-1560082897267?download=1080p.mp4">
</video>
<span>Travel Reel</span>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">
<span>Nature</span>
</div>

</div>

</body>
</html>
