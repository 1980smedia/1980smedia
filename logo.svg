<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="apertureFill" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FFE55C;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Aperture Circle (Main) -->
  <circle cx="280" cy="300" r="150" fill="url(#apertureFill)" stroke="url(#goldGradient)" stroke-width="3"/>

  <!-- Aperture Blades -->
  <!-- Blade 1 -->
  <path d="M 280,150 L 380,250 L 280,300 Z" fill="#B8860B" opacity="0.8"/>
  
  <!-- Blade 2 -->
  <path d="M 380,250 L 360,380 L 280,300 Z" fill="#A0826D" opacity="0.8"/>
  
  <!-- Blade 3 -->
  <path d="M 360,380 L 200,370 L 280,300 Z" fill="#B8860B" opacity="0.8"/>
  
  <!-- Blade 4 -->
  <path d="M 200,370 L 180,230 L 280,300 Z" fill="#8B6914" opacity="0.8"/>
  
  <!-- Blade 5 -->
  <path d="M 180,230 L 280,150 L 280,300 Z" fill="#A0826D" opacity="0.8"/>

  <!-- Aperture Center K Logo -->
  <g transform="translate(280, 295)">
    <!-- Stylized K -->
    <path d="M -15,-25 L -15,25 M -15,0 L 20,-25 M -15,0 L 20,25" 
          stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Small diamond accent -->
    <polygon points="0,35 5,40 0,45 -5,40" fill="white" opacity="0.9"/>
  </g>

  <!-- Vertical Divider Line -->
  <line x1="480" y1="150" x2="480" y2="450" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"/>

  <!-- Text: 1980s MEDIA -->
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="88" font-weight="bold" fill="url(#goldGradient)" 
        stroke="#8B6914" stroke-width="1.5" letter-spacing="4">
    1980s
  </text>
  
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="95" font-weight="bold" fill="url(#goldGradient)" 
        stroke="#8B6914" stroke-width="1.5" letter-spacing="8">
    MEDIA
  </text>

  <!-- Tagline: CINEMATIC SPIRITUAL STORYTELLING -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="28" fill="url(#goldGradient)" 
        letter-spacing="3" font-weight="500">
    CINEMATIC SPIRITUAL STORYTELLING
  </text>

  <!-- Subtle outline/border effect on circle -->
  <circle cx="280" cy="300" r="150" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
</svg>