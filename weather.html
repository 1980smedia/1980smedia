<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1980s Media - Weather Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
height:55px;
cursor:pointer;
transition:0.3s;
}

.logo img:hover{
transform:scale(1.1);
}

.menu{
display:flex;
gap:12px;
}

.menu button{
background:#d4a43c;
border:none;
padding:10px 20px;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
color:black;
}

.menu button:hover{
transform:scale(1.05);
}

/* DATE TIME WIDGET */

.datetime-widget{
position:fixed;
top:100px;
right:40px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
padding:20px;
border:1px solid rgba(255,255,255,0.2);
min-width:250px;
z-index:999;
}

.datetime-widget h3{
font-size:14px;
opacity:0.8;
margin-bottom:10px;
}

.date-display{
font-size:18px;
font-weight:600;
margin-bottom:8px;
}

.time-display{
font-size:28px;
font-weight:700;
color:#FFD700;
font-family:monospace;
}

.day-display{
font-size:14px;
opacity:0.9;
margin-top:8px;
}

/* CONTAINER */

.container{
padding:150px 40px 60px;
max-width:1200px;
margin:0 auto;
}

.page-title{
font-size:48px;
margin-bottom:40px;
color:white;
text-shadow:2px 2px 4px rgba(0,0,0,0.3);
}

/* SEARCH BAR */

.search-container{
display:flex;
gap:10px;
margin-bottom:30px;
}

.search-container input{
flex:1;
padding:15px 20px;
border:none;
border-radius:8px;
font-size:16px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(10px);
}

.search-container input::placeholder{
color:rgba(255,255,255,0.7);
}

.search-container button{
padding:15px 30px;
background:#d4a43c;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
color:black;
font-size:16px;
}

.search-container button:hover{
transform:scale(1.05);
background:#e8b843;
}

/* WEATHER CARDS */

.weather-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
gap:25px;
margin-bottom:40px;
}

.weather-card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:16px;
padding:30px;
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
box-shadow:0 8px 32px rgba(31,38,135,0.37);
}

.weather-card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,0.25);
}

.city-name{
font-size:28px;
font-weight:700;
margin-bottom:15px;
color:#FFD700;
}

.temperature{
font-size:56px;
font-weight:bold;
margin:20px 0;
}

.weather-description{
font-size:18px;
margin:10px 0;
text-transform:capitalize;
opacity:0.9;
}

.weather-details{
margin-top:20px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.2);
}

.detail-item{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.detail-label{
opacity:0.7;
}

.detail-value{
font-weight:600;
}

/* CURRENT LOCATION CARD */

.current-location-card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:16px;
padding:30px;
border:2px solid #d4a43c;
margin-bottom:40px;
text-align:center;
}

.current-location-card h2{
font-size:24px;
margin-bottom:15px;
}

.btn-use-location{
background:#d4a43c;
color:black;
border:none;
padding:12px 25px;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
margin-top:15px;
}

.btn-use-location:hover{
transform:scale(1.05);
background:#e8b843;
}

/* LOADING STATE */

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

.spinner{
display:inline-block;
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ERROR MESSAGE */

.error-message{
background:rgba(255,0,0,0.2);
border:2px solid #ff6b6b;
color:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

/* FOOTER */

footer{
background:rgba(0,0,0,0.5);
padding:22px;
text-align:center;
font-size:15px;
position:fixed;
bottom:0;
width:100%;
}

/* MOBILE */

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
padding:15px;
}

.datetime-widget{
position:static;
margin:15px 0;
}

.container{
padding:150px 20px 80px;
}

.page-title{
font-size:32px;
}

.search-container{
flex-direction:column;
}

.weather-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo" onclick="goHome()" title="Go to Home">

<img src="https://i.imgur.com/ZK7YQbH.png" alt="1980s Media">

</div>

<div class="menu">

<button onclick="showSection('home')">Home</button>
<button onclick="showSection('about')">About</button>
<button onclick="showSection('contact')">Contact</button>

</div>

</nav>

<!-- DATE TIME WIDGET -->

<div class="datetime-widget">

<h3>📅 Current Date & Time</h3>

<div class="date-display" id="dateDisplay">Loading...</div>

<div class="time-display" id="timeDisplay">00:00:00</div>

<div class="day-display" id="dayDisplay">Loading...</div>

</div>

<!-- CONTAINER -->

<div class="container">

<h1 class="page-title">🌤️ Weather Dashboard</h1>

<!-- CURRENT LOCATION SECTION -->

<div class="current-location-card">

<h2>Use Your Current Location</h2>

<p>Click below to get weather for your current location</p>

<button class="btn-use-location" onclick="getWeatherByLocation()">📍 Get My Location Weather</button>

</div>

<!-- SEARCH SECTION -->

<div class="search-container">

<input 
type="text" 
id="cityInput" 
placeholder="Enter city name (e.g., London, New York, Tokyo)..." 
onkeypress="handleEnter(event)">

<button onclick="searchWeather()">Search</button>

</div>

<!-- ERROR MESSAGE -->

<div id="errorMessage" class="error-message" style="display:none;"></div>

<!-- WEATHER RESULTS -->

<div class="weather-grid" id="weatherGrid">

<div class="loading">
<div class="spinner"></div>
<p>Enter a city name to get started...</p>
</div>

</div>

</div>

<!-- FOOTER -->

<footer>

© 2026 1980s Media • Cinematic Spiritual Storytelling

</footer>

<script>

// API Key from Open-Meteo (Free, no API key needed!)
const WEATHER_API = 'https://geocoding-api.open-meteo.com/v1/search';
const FORECAST_API = 'https://api.open-meteo.com/v1/forecast';

// Update date and time every second
function updateDateTime(){
const now = new Date();

// Format date
const options = {year:'numeric', month:'long', day:'numeric'};
const dateStr = now.toLocaleDateString('en-US', options);
document.getElementById('dateDisplay').textContent = dateStr;

// Format time (HH:MM:SS)
const hours = String(now.getHours()).padStart(2,'0');
const minutes = String(now.getMinutes()).padStart(2,'0');
const seconds = String(now.getSeconds()).padStart(2,'0');
document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;

// Format day
const dayOptions = {weekday:'long'};
const dayStr = now.toLocaleDateString('en-US', dayOptions);
document.getElementById('dayDisplay').textContent = dayStr;
}

// Update time every second
setInterval(updateDateTime, 1000);
updateDateTime(); // Initial call

// Hide error message
function hideError(){
document.getElementById('errorMessage').style.display = 'none';
}

// Show error message
function showError(message){
const errorDiv = document.getElementById('errorMessage');
errorDiv.textContent = message;
errorDiv.style.display = 'block';
}

// Show loading state
function showLoading(){
document.getElementById('weatherGrid').innerHTML = `
<div class="loading">
<div class="spinner"></div>
<p>Fetching weather data...</p>
</div>
`;
}

// Get weather by city name
async function searchWeather(){
const city = document.getElementById('cityInput').value.trim();

if(!city){
showError('Please enter a city name!');
return;
}

hideError();
showLoading();

try{
// Get coordinates of the city
const geoResponse = await fetch(`${WEATHER_API}?name=${city}&count=1&language=en&format=json`);
const geoData = await geoResponse.json();

if(!geoData.results || geoData.results.length === 0){
showError('City not found. Please try another search.');
return;
}

const location = geoData.results[0];
const {latitude, longitude, name, country} = location;

// Get weather data
await getWeatherData(latitude, longitude, `${name}, ${country}`);

}catch(error){
showError('Error fetching weather data. Please try again.');
console.error(error);
}
}

// Get weather by geolocation
async function getWeatherByLocation(){
showLoading();
hideError();

if(!navigator.geolocation){
showError('Geolocation is not supported by your browser');
return;
}

navigator.geolocation.getCurrentPosition(
async (position) => {
const {latitude, longitude} = position.coords;
await getWeatherData(latitude, longitude, 'Your Location');
},
(error) => {
showError('Unable to access your location. ' + error.message);
}
);
}

// Fetch and display weather data
async function getWeatherData(latitude, longitude, locationName){
try{
const response = await fetch(
`${FORECAST_API}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&temperature_unit=celsius&timezone=auto`
);

const data = await response.json();
const current = data.current;
const daily = data.daily;

const weatherDescriptions = {
0: 'Clear',
1: 'Mainly Clear',
2: 'Partly Cloudy',
3: 'Overcast',
45: 'Foggy',
48: 'Foggy',
51: 'Light Drizzle',
53: 'Moderate Drizzle',
55: 'Dense Drizzle',
61: 'Slight Rain',
63: 'Moderate Rain',
65: 'Heavy Rain',
71: 'Slight Snow',
73: 'Moderate Snow',
75: 'Heavy Snow',
80: 'Slight Rain Showers',
81: 'Moderate Rain Showers',
82: 'Violent Rain Showers',
85: 'Slight Snow Showers',
86: 'Heavy Snow Showers',
95: 'Thunderstorm',
96: 'Thunderstorm with Hail',
99: 'Thunderstorm with Hail'
};

const weatherCode = current.weather_code;
const weatherDescription = weatherDescriptions[weatherCode] || 'Unknown';

// Build weather cards
let html = `
<div class="weather-card">
<div class="city-name">${locationName}</div>
<div class="temperature">${Math.round(current.temperature_2m)}°C</div>
<div class="weather-description">${weatherDescription}</div>
<div class="weather-details">
<div class="detail-item">
<span class="detail-label">Humidity:</span>
<span class="detail-value">${current.relative_humidity_2m}%</span>
</div>
<div class="detail-item">
<span class="detail-label">Wind Speed:</span>
<span class="detail-value">${Math.round(current.wind_speed_10m)} km/h</span>
</div>
<div class="detail-item">
<span class="detail-label">Feels Like:</span>
<span class="detail-value">${Math.round(current.temperature_2m - 2)}°C</span>
</div>
</div>
</div>
`;

// Add 7-day forecast
for(let i = 0; i < Math.min(7, daily.time.length); i++){
const date = new Date(daily.time[i]);
const dayName = date.toLocaleDateString('en-US', {weekday: 'short'});
const maxTemp = Math.round(daily.temperature_2m_max[i]);
const minTemp = Math.round(daily.temperature_2m_min[i]);
const precipitation = daily.precipitation_sum[i];
const code = daily.weather_code[i];
const desc = weatherDescriptions[code] || 'Unknown';

html += `
<div class="weather-card">
<div class="city-name">${dayName}</div>
<div style="font-size:24px; margin:15px 0;">📊</div>
<div class="weather-description">${desc}</div>
<div class="weather-details">
<div class="detail-item">
<span class="detail-label">Max:</span>
<span class="detail-value">${maxTemp}°C</span>
</div>
<div class="detail-item">
<span class="detail-label">Min:</span>
<span class="detail-value">${minTemp}°C</span>
</div>
<div class="detail-item">
<span class="detail-label">Precipitation:</span>
<span class="detail-value">${precipitation} mm</span>
</div>
</div>
</div>
`;
}

document.getElementById('weatherGrid').innerHTML = html;

}catch(error){
showError('Error fetching weather data. Please try again.');
console.error(error);
}
}

// Handle Enter key press
function handleEnter(event){
if(event.key === 'Enter'){
searchWeather();
}
}

// Go to home
function goHome(){
window.location.href = 'index.html';
}

// Show section
function showSection(id){
if(id === 'home'){
window.location.href = 'index.html';
}else if(id === 'contact'){
window.location.href = 'index.html#contact';
}
}

// Initialize with default city
window.addEventListener('load', () => {
document.getElementById('cityInput').value = 'Ahmedabad';
searchWeather();
});

</script>

</body>
</html>
